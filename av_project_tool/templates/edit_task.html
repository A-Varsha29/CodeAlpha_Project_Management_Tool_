<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212 !important; color: #ffffff; }
        .card { background-color: #1e1e1e !important; border: 1px solid #333; }
        .form-control, .form-select { background-color: #2c2c2c !important; color: white !important; }
    </style>
</head>
<body class="container mt-5">
    <h2 class="mb-4">Edit Task: {{ task.title }}</h2>
    <div class="card p-4">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{% url 'project_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
